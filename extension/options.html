<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Video Translation Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon48.png" alt="" width="48" height="48" />
        <div>
          <h1>Live Video Translation</h1>
          <p>Secure backend configuration for YouTube audio translation.</p>
        </div>
      </header>

      <form id="options-form" novalidate>
        <label for="backend-wss-url">Backend WebSocket URL</label>
        <input
          id="backend-wss-url"
          name="backendWssUrl"
          type="url"
          inputmode="url"
          placeholder="wss://example.com/stream"
          autocomplete="url"
          required
        />

        <label for="auth-token">Auth token</label>
        <input
          id="auth-token"
          name="authToken"
          type="password"
          autocomplete="off"
          required
        />

        <div class="actions">
          <button type="submit">Save</button>
          <button id="reveal-token" type="button">Show token</button>
        </div>

        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script type="module" src="dist/options.js"></script>
  </body>
</html>
