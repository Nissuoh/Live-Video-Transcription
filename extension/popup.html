<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Video Translation</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings-shell popup">
      <header class="brand-header">
        <img class="brand-icon" src="icons/icon48.png" alt="" width="40" height="40" />
        <div>
          <p class="eyebrow" data-i18n="productEyebrow">YouTube audio translator</p>
          <h1 data-i18n="appName">Live Video Translation</h1>
          <p data-i18n="popupSubtitle">
            The current YouTube video is detected automatically when translation is enabled.
          </p>
        </div>
      </header>

      <form id="options-form" novalidate>
        <section class="settings-section" aria-labelledby="interface-heading">
          <h2 id="interface-heading" data-i18n="interfaceSection">Interface</h2>
          <label for="ui-language" data-i18n="uiLanguageLabel">Interface language</label>
          <select id="ui-language" name="uiLanguage"></select>
        </section>

        <section class="settings-section" aria-labelledby="connection-heading">
          <h2 id="connection-heading" data-i18n="connectionSection">Connection</h2>
          <div id="backend-field">
            <label for="backend-wss-url" data-i18n="backendUrlLabel">Backend WebSocket URL</label>
            <input
              id="backend-wss-url"
              name="backendWssUrl"
              type="url"
              inputmode="url"
              placeholder="wss://example.com/stream"
              data-i18n-placeholder="backendUrlPlaceholder"
              autocomplete="url"
              required
            />
          </div>

          <label for="auth-token" data-i18n="authTokenLabel">Backend access token</label>
          <input
            id="auth-token"
            name="authToken"
            type="password"
            placeholder="Backend access token"
            data-i18n-placeholder="authTokenPlaceholder"
            autocomplete="off"
            required
          />
        </section>

        <section class="settings-section" aria-labelledby="language-heading">
          <h2 id="language-heading" data-i18n="languageSection">Language</h2>
          <div class="language-grid">
            <div>
              <label for="source-language" data-i18n="sourceLanguageLabel">From</label>
              <select id="source-language" name="sourceLanguage"></select>
            </div>
            <div>
              <label for="target-language" data-i18n="targetLanguageLabel">To</label>
              <select id="target-language" name="targetLanguage"></select>
            </div>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="voice-heading">
          <h2 id="voice-heading" data-i18n="voiceSection">Voice</h2>
          <div class="language-grid">
            <div>
              <label for="voice-gender" data-i18n="voiceGenderLabel">Voice gender</label>
              <select id="voice-gender" name="voiceGender">
                <option value="male" data-i18n="voiceGenderMale">Male</option>
                <option value="female" data-i18n="voiceGenderFemale">Female</option>
              </select>
            </div>
            <div>
              <label for="voice-pitch" data-i18n="voicePitchLabel">Pitch</label>
              <select id="voice-pitch" name="voicePitch">
                <option value="normal" data-i18n="voicePitchNormal">Normal</option>
                <option value="low" data-i18n="voicePitchLow">Low</option>
                <option value="high" data-i18n="voicePitchHigh">High</option>
              </select>
            </div>
          </div>
          <label class="checkbox-row" for="preserve-voice-pitch">
            <input id="preserve-voice-pitch" name="preserveVoicePitch" type="checkbox" />
            <span data-i18n="preserveVoicePitchLabel">
              Keep voice pitch when YouTube speed changes
            </span>
          </label>
        </section>

        <section class="settings-section" aria-labelledby="automation-heading">
          <h2 id="automation-heading" data-i18n="automationSection">Automation</h2>
          <label class="checkbox-row" for="auto-translate">
            <input id="auto-translate" name="autoTranslate" type="checkbox" />
            <span data-i18n="autoTranslateLabel">Enable automatic translation on YouTube</span>
          </label>

          <p class="notice" data-i18n="aiDisclosure">
            Translated speech is AI-generated and sent through your configured backend.
          </p>
        </section>

        <div class="actions">
          <button type="submit" data-i18n="saveButton">Save</button>
          <button id="reveal-token" type="button" data-i18n="showTokenButton">Show token</button>
        </div>

        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script type="module" src="dist/options.js"></script>
  </body>
</html>
